# Error-related potential (ErrP) dataset, 2-class no_error/error, 64 channels.
# Two stages: preprocess.py (per-subject .pkl) -> consolidate.py (per-subject .h5).
data:
  train_path: /path/to/datasets/error/train_set/EEG/training_data   # subject folders, each with data/*.vhdr
  test_path:  /path/to/datasets/error/test_data/EEG

channels:
  n_channels: 64
  names:
    - Fp1
    - Fp2
    - F7
    - F3
    - Fz
    - F4
    - F8
    - FC5
    - FC1
    - FC2
    - FC6
    - T7
    - C3
    - Cz
    - C4
    - T8
    - TP9
    - CP5
    - CP1
    - CP2
    - CP6
    - TP10
    - P7
    - P3
    - Pz
    - P4
    - P8
    - PO9
    - O1
    - Oz
    - O2
    - PO10
    - AF7
    - AF3
    - AF4
    - AF8
    - F5
    - F1
    - F2
    - F6
    - FT9
    - FT7
    - FC3
    - FC4
    - FT8
    - FT10
    - C5
    - C1
    - C2
    - C6
    - TP7
    - CP3
    - CPz
    - CP4
    - TP8
    - P5
    - P1
    - P2
    - P6
    - PO7
    - PO3
    - POz
    - PO4
    - PO8

filter:
  l_freq: 0.1
  h_freq: 75

resample_freq: 256

events:
  mapping:
    Stimulus/S 96: error
    Stimulus/S 48: no_error

epochs:
  tmin: 0.0
  tmax: 1.0          # 1 s window -> 256 samples at 256 Hz
  baseline: null

output:
  dir: /path/to/outputs/error_processed              # per-subject {sub}.pkl / {sub}_test.pkl
  consolidate_dir: /path/to/outputs/error_processed/consolidate   # per-subject {sub}.h5 (consumed by ErrorDataset)
