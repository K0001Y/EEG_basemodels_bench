name: eeg-fm-bench
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──
  - python=3.11

  # ── PyTorch (CUDA 11.8) ──
  - pytorch=2.0.1
  - torchvision=0.15.2
  - torchaudio=2.0.2
  - pytorch-cuda=11.8

  - numpy>=1.24,<2         
  - scipy>=1.11
  - scikit-learn>=1.3
  - pandas>=1.5,<2         

  - mne=1.4.2              
  - h5py>=3.9
  - pyedflib>=0.1.38       

  - matplotlib>=3.7
  - tqdm>=4.65
  - pyyaml>=6.0
  - einops>=0.7
  - pillow>=10.0

  - pip
  - pip:
    - timm==0.4.12
    - deepspeed==0.4.0
    - pyhealth==1.1.4
    - blobfile>=3.0

    - tensorboardX==1.8
    - protobuf<=3.20.3     

    - lmdb>=1.4
    - ptflops>=0.7
    - torchinfo>=1.8
    - umap-learn>=0.5

    - transformers>=4.36
    - accelerate>=0.21
    - safetensors>=0.4
    - huggingface_hub>=0.25

    - psutil
    - rich
